[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# www redirect (non-www → www)
[[redirects]]
  from = "https://wagelab.co.uk/*"
  to = "https://www.wagelab.co.uk/:splat"
  status = 301
  force = true

# HTTP → HTTPS (Netlify handles this automatically, but explicit for clarity)
[[redirects]]
  from = "http://www.wagelab.co.uk/*"
  to = "https://www.wagelab.co.uk/:splat"
  status = 301
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
